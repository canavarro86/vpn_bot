name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/vpn_bot

            # Tracked files only. data/ and .env are gitignored -> untouched.
            # Xray config (/usr/local/etc/xray/config.json) is outside repo -> untouched.
            git fetch --prune origin
            git reset --hard origin/main

            # venv must exist on server: python3 -m venv /opt/vpn_bot/venv
            ./venv/bin/pip install -q --upgrade -r requirements.txt

            # Schema is applied on boot by repo.init_schema() (idempotent,
            # CREATE TABLE IF NOT EXISTS). No manual sqlite step needed.
            sudo systemctl restart hideway-bot
            sudo systemctl --no-pager --lines=0 status hideway-bot
