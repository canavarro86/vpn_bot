name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/vpn_bot

            # Tracked files only. data/ and .env are gitignored -> untouched.
            # Xray config (/usr/local/etc/xray/config.json) is outside repo -> untouched.
            git fetch --prune origin
            git reset --hard origin/main

            # venv must exist on server: python3 -m venv /opt/vpn_bot/venv
            ./venv/bin/pip install -q --upgrade -r requirements.txt

            # One-time legacy migration. Runs as hidewaybot (owns data/).
            # Self-guards: skips if users table non-empty (idempotent), so
            # repeat deploys no-op. || true keeps deploy green either way.
            sudo -u hidewaybot ./venv/bin/python scripts/migrate_legacy_json.py \
              --data-dir /opt/vpn_bot/DB_ARH \
              --db /opt/vpn_bot/data/hideway.db \
              --apply || true

            # Schema is applied on boot by repo.init_schema() (idempotent,
            # CREATE TABLE IF NOT EXISTS). No manual sqlite step needed.
            sudo /usr/bin/systemctl restart hideway-bot
            sudo /usr/bin/systemctl --no-pager --lines=0 status hideway-bot

            # --- Health checks (fail deploy on any miss) ---
            sleep 5

            # 1. Service active
            if [ "$(systemctl is-active hideway-bot)" != "active" ]; then
              echo "❌ hideway-bot not active"
              exit 1
            fi

            # 2. Bot reached polling
            if ! journalctl -u hideway-bot -n 5 --no-pager | grep -q "polling"; then
              echo "❌ 'polling' not found in recent logs"
              exit 1
            fi

            # 3. DB accessible + report user count (post-migration)
            if ! python3 -c "import sqlite3; sqlite3.connect('/opt/vpn_bot/data/hideway.db').execute('SELECT 1')"; then
              echo "❌ DB not accessible"
              exit 1
            fi
            USERS=$(python3 -c "import sqlite3; print(sqlite3.connect('/opt/vpn_bot/data/hideway.db').execute('SELECT COUNT(*) FROM users').fetchone()[0])")
            echo "👥 users in DB: $USERS"

            echo "✅ Deploy OK"
